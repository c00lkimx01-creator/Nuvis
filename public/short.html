<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuvis - ショート</title>
<link rel="stylesheet" href="/style.css">
<style>
body { overflow: hidden; }

.main { padding-top: var(--nav-h); height: calc(100vh - var(--nav-h)); overflow: hidden; }

.shorts-container {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.shorts-container::-webkit-scrollbar { display: none; }

.short-item {
  height: 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: #000;
}

.short-player {
  position: relative;
  height: 100%;
  max-width: 400px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
}

.short-player iframe,
.short-player video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border: none;
}

/* Info overlay */
.short-info {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 20px 16px;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  z-index: 2;
  pointer-events: none;
}

.short-title {
  font-size: 0.9rem;
  font-weight: 600;
  color: #fff;
  margin-bottom: 6px;
  line-height: 1.4;
}

.short-channel {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.75);
  display: flex;
  align-items: center;
  gap: 6px;
  pointer-events: all;
  cursor: pointer;
}

.short-channel:hover { color: #fff; }

/* Side actions */
.short-actions {
  position: absolute;
  right: 12px;
  bottom: 100px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 2;
}

@media (min-width: 480px) {
  .short-actions { right: calc(50% - 200px - 60px); }
}

.short-action-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(6px);
  border: none;
  border-radius: 12px;
  padding: 10px 14px;
  color: #fff;
  cursor: pointer;
  font-size: 0.7rem;
  font-weight: 600;
  transition: background 0.2s;
}

.short-action-btn:hover { background: rgba(255,255,255,0.2); }
.short-action-btn.active { background: rgba(124,58,237,0.4); }
.short-action-btn svg { width:22px; height:22px; }

/* Mode switcher overlay */
.short-mode-bar {
  position: fixed;
  top: calc(var(--nav-h) + 8px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 10;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  padding: 6px 10px;
  border-radius: 100px;
  border: 1px solid rgba(255,255,255,0.1);
}

.short-mode-btn {
  padding: 5px 14px;
  border-radius: 100px;
  font-size: 0.75rem;
  font-weight: 600;
  background: transparent;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
}

.short-mode-btn.active { background: var(--accent); color: #fff; }

/* Loading placeholder */
.short-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  background: #111;
  color: rgba(255,255,255,0.5);
  font-size: 0.85rem;
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="/home" class="nav-logo">Nuvis</a>
  <div class="nav-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="nav-q" placeholder="動画を検索..." autocomplete="off">
    <button onclick="doSearch()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
  </div>
  <div class="nav-actions">
    <a href="/history" class="nav-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>履歴</span></a>
    <a href="/favorites" class="nav-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>お気に入り</span></a>
    <a href="/subscriptions" class="nav-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg><span>登録チャンネル</span></a>
    <a href="/settings" class="nav-btn-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
  </div>
</nav>

<!-- Mode bar -->
<div class="short-mode-bar">
  <button class="short-mode-btn" data-mode="nocookie" onclick="switchMode('nocookie')">ノークッキー</button>
  <button class="short-mode-btn" data-mode="edu" onclick="switchMode('edu')">EDU</button>
  <button class="short-mode-btn" data-mode="stream" onclick="switchMode('stream')">Stream</button>
</div>

<div class="main">
  <div class="shorts-container" id="shorts-container">
    <div class="short-item">
      <div class="short-placeholder"><div class="spinner"></div><span>ショートを読み込み中...</span></div>
    </div>
  </div>
</div>

<script src="/nuvis.js"></script>
<script>
if (!requireAuth()) {}

const params = new URLSearchParams(location.search);
const startId = params.get('v');

let currentMode = getPlayMode();
let shorts = [];
let loadedFrames = {};

function doSearch() {
  const q = document.getElementById('nav-q').value.trim();
  if (q) window.location.href = `/search?v=${encodeURIComponent(q)}`;
}
document.getElementById('nav-q').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

function setModeActive(mode) {
  document.querySelectorAll('.short-mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

function switchMode(mode) {
  currentMode = mode;
  setPlayMode(mode);
  setModeActive(mode);
  // Reload all visible iframes
  loadedFrames = {};
  renderShorts();
}

setModeActive(currentMode);

async function loadShorts() {
  // Try to get trending/search results
  let videos = [];

  if (startId) {
    // Start with the requested short
    videos.push({ id: startId, title: 'ショート動画', channelName: '' });
  }

  const result = await getTrending();
  if (result) {
    const trending = result.data.map(v => normalizeVideo(v, result.source));
    // Filter for shorts (< 61 seconds) or include all
    const filtered = trending.filter(v => !v.duration || v.duration < 121);
    videos = [...videos, ...filtered];
  }

  shorts = videos;
  renderShorts();
}

function buildShortPlayer(video, index) {
  const item = document.createElement('div');
  item.className = 'short-item';
  item.dataset.index = index;
  item.dataset.id = video.id;

  const player = document.createElement('div');
  player.className = 'short-player';

  // Placeholder until visible
  player.innerHTML = `<div class="short-placeholder" id="ph-${video.id}"><div class="spinner"></div></div>`;

  const info = document.createElement('div');
  info.className = 'short-info';
  info.innerHTML = `
    <div class="short-title">${escapeHtml(video.title || '')}</div>
    <div class="short-channel" onclick="navigate('/channel/${video.channelId || ''}')">${escapeHtml(video.channelName || '')}</div>
  `;

  const actions = document.createElement('div');
  actions.className = 'short-actions';

  const isFav = isFavorite(video.id);
  actions.innerHTML = `
    <button class="short-action-btn ${isFav ? 'active' : ''}" id="fav-${video.id}" onclick="doFavShort('${video.id}', this)">
      <svg viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>保存</span>
    </button>
    <button class="short-action-btn" onclick="navigate('/watch?v=${video.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      <span>動画で見る</span>
    </button>
  `;

  item.appendChild(player);
  item.appendChild(info);
  item.appendChild(actions);

  return item;
}

function loadFrame(item) {
  const id = item.dataset.id;
  if (loadedFrames[id]) return;
  loadedFrames[id] = true;

  const player = item.querySelector('.short-player');
  if (!player) return;

  if (currentMode === 'stream') {
    // Stream mode - use video element
    (async () => {
      let streamUrl = null;
      const streamBases = [
        `https://yudlp.vercel.app/stream/${id}`,
        `https://senninytdlp.vercel.app/stream/${id}`,
        `https://siawaseok.f5.si/api/streams/${id}`,
        `https://simple-yt-stream.onrender.com/api/video/${id}`,
      ];
      for (const url of streamBases) {
        try {
          const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
          if (!r.ok) continue;
          const ct = r.headers.get('content-type') || '';
          if (ct.includes('json')) {
            const d = await r.json();
            streamUrl = d.url || d.stream_url || d.streamUrl || d.videoUrl;
          } else {
            streamUrl = url;
          }
          if (streamUrl) break;
        } catch {}
      }
      if (!streamUrl) {
        // fallback nocookie
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&mute=0`;
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope';
        player.innerHTML = '';
        player.appendChild(iframe);
        return;
      }
      const video = document.createElement('video');
      video.src = streamUrl;
      video.controls = true;
      video.autoplay = true;
      video.loop = true;
      video.style.width = '100%';
      video.style.height = '100%';
      player.innerHTML = '';
      player.appendChild(video);
    })();
  } else {
    const src = currentMode === 'edu'
      ? `https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}`
      : `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&loop=1&playlist=${id}`;
    const iframe = document.createElement('iframe');
    iframe.src = src;
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope';
    iframe.allowFullscreen = true;
    iframe.onload = () => {
      const ph = player.querySelector('.short-placeholder');
      if (ph) ph.remove();
    };
    player.innerHTML = '';
    player.appendChild(iframe);
  }
}

function renderShorts() {
  const container = document.getElementById('shorts-container');
  container.innerHTML = '';

  shorts.forEach((v, i) => {
    const item = buildShortPlayer(v, i);
    container.appendChild(item);
  });

  // Intersection Observer for lazy loading frames
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        loadFrame(entry.target);
        // Update URL
        const id = entry.target.dataset.id;
        if (id) history.replaceState(null, '', `/short?v=${id}`);
      }
    });
  }, { threshold: 0.7 });

  container.querySelectorAll('.short-item').forEach(item => observer.observe(item));

  // Load first
  const first = container.querySelector('.short-item');
  if (first) loadFrame(first);
}

function doFavShort(id, btn) {
  const video = shorts.find(v => v.id === id) || { id };
  const added = toggleFavorite(video);
  btn.classList.toggle('active', added);
  const svg = btn.querySelector('svg');
  if (svg) svg.setAttribute('fill', added ? 'currentColor' : 'none');
}

loadShorts();
</script>
</body>
</html>
