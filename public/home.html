<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nuvis - ホーム</title>
<link rel="stylesheet" href="/style.css">
<style>
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  padding: 80px 20px 40px;
  overflow: hidden;
}

.hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(124,58,237,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 10%, rgba(192,132,252,0.08) 0%, transparent 50%),
    var(--bg);
  z-index: 0;
}

.hero-grid {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.35;
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 640px;
  animation: fadeUp 0.7s cubic-bezier(0.4,0,0.2,1);
}

@keyframes fadeUp {
  from { opacity:0; transform: translateY(28px); }
  to { opacity:1; transform: translateY(0); }
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(124,58,237,0.12);
  border: 1px solid rgba(124,58,237,0.25);
  border-radius: 100px;
  padding: 6px 16px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--accent3);
  margin-bottom: 28px;
}

.hero-title {
  font-size: clamp(2.4rem, 6vw, 4rem);
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -2px;
  margin-bottom: 18px;
  color: var(--text);
}

.hero-title span {
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-sub {
  color: var(--text2);
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 36px;
}

.hero-search {
  display: flex;
  align-items: center;
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: 100px;
  padding: 8px 8px 8px 24px;
  gap: 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 560px;
  width: 100%;
  margin: 0 auto 32px;
}

.hero-search:focus-within {
  border-color: var(--accent2);
  box-shadow: 0 8px 40px rgba(124,58,237,0.2);
}

.hero-search input {
  flex: 1;
  background: transparent;
  color: var(--text);
  font-size: 1rem;
}

.hero-search input::placeholder { color: var(--text3); }

.hero-search-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  padding: 10px 24px;
  border-radius: 100px;
  font-size: 0.9rem;
  font-weight: 700;
  transition: all 0.2s;
  white-space: nowrap;
}

.hero-search-btn:hover {
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  transform: translateY(-1px);
}

.hero-tabs {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* Video section */
.video-section {
  padding: 32px 24px 48px;
  max-width: 1280px;
  margin: 0 auto;
}

.section-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
}

.tab-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 0.875rem;
  font-weight: 600;
  background: transparent;
  color: var(--text2);
  transition: all 0.2s;
  cursor: pointer;
}

.tab-btn:hover { background: var(--bg3); color: var(--text); }

.tab-btn.active {
  background: rgba(124,58,237,0.12);
  color: var(--accent3);
}

.tab-btn svg { width:16px; height:16px; }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-content">
    <div class="hero-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span>Nuvis - 動画を検索・視聴</span>
    </div>
    <h1 class="hero-title"><span>Nuvis</span>で動画を<br>発見</h1>
    <p class="hero-sub" id="hero-sub">Nuvisでトレンド動画を探し、履歴やお気に入りを管理</p>
    <div class="hero-search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="hero-input" placeholder="動画を検索..." autocomplete="off">
      <button class="hero-search-btn" id="hero-btn" onclick="doSearch()">動画を検索</button>
    </div>
    <div class="hero-tabs">
      <button class="pill pill-ghost" onclick="switchTab('trending')" id="tab-trending">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <span id="lbl-trending">トレンド</span>
      </button>
      <button class="pill pill-ghost" onclick="switchTab('history')" id="tab-history">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span id="lbl-history">履歴</span>
      </button>
      <button class="pill pill-ghost" onclick="switchTab('popular')" id="tab-popular">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span id="lbl-popular">急上昇</span>
      </button>
    </div>
  </div>
</div>

<div class="video-section" id="video-section" style="display:none;">
  <div class="section-tabs" id="section-tabs"></div>
  <div id="videos-container"></div>
</div>

<script src="/nuvis.js"></script>
<script>
if (!requireAuth()) {}

let currentTab = null;

function applyLang() {
  document.getElementById('hero-input').placeholder = t('searchPlaceholder');
  document.getElementById('hero-btn').textContent = t('search');
  document.getElementById('hero-sub').textContent = 'Nuvisでトレンド動画を探し、履歴やお気に入りを管理';
  document.getElementById('lbl-trending').textContent = t('trending');
  document.getElementById('lbl-history').textContent = t('history');
  document.getElementById('lbl-popular').textContent = t('popular');
}
applyLang();

function doSearch() {
  const q = document.getElementById('hero-input').value.trim();
  if (!q) return;
  window.location.href = `/search?v=${encodeURIComponent(q)}`;
}

document.getElementById('hero-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function setTabActive(id) {
  ['tab-trending','tab-history','tab-popular'].forEach(tid => {
    const el = document.getElementById(tid);
    el.className = 'pill pill-ghost';
  });
  document.getElementById(id).className = 'pill pill-active';
}

async function switchTab(tab) {
  if (currentTab === tab) return;
  currentTab = tab;
  setTabActive('tab-' + (tab === 'popular' ? 'popular' : tab));

  const section = document.getElementById('video-section');
  const container = document.getElementById('videos-container');
  section.style.display = 'block';

  container.innerHTML = `<div class="loading-center"><div class="spinner"></div><span>${t('loading')}</span></div>`;

  if (tab === 'history') {
    const hist = getHistory();
    container.innerHTML = '';
    if (!hist.length) {
      container.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>${t('noHistory')}</span></div>`;
      return;
    }
    const grid = document.createElement('div');
    grid.className = 'video-grid';
    hist.forEach(v => grid.appendChild(buildVideoCard(v)));
    container.appendChild(grid);
    return;
  }

  const result = await getTrending();
  container.innerHTML = '';

  if (!result) {
    container.innerHTML = `<div class="empty-state"><span>${t('noResults')}</span></div>`;
    return;
  }

  let videos = result.data.map(v => normalizeVideo(v, result.source));

  if (tab === 'popular') {
    videos = videos.slice(0, 15);
  } else {
    videos = videos.slice(0, 24);
  }

  const grid = document.createElement('div');
  grid.className = 'video-grid';
  videos.forEach(v => grid.appendChild(buildVideoCard(v)));
  container.appendChild(grid);

  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
